name: Deploy Dashboard to Static Web App

on:
  push:
    branches: [feat/whitelabel-preset, main]
    paths:
      - 'dashboard/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm run build

      # feat/whitelabel-preset -> SWA Helix (ins-ai-demo-swa-acme)
      - name: Deploy to SWA (Helix / whitelabel)
        if: github.ref == 'refs/heads/feat/whitelabel-preset'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dashboard
          output_location: dist
          skip_app_build: true

      # main -> SWA Santander (ins-ai-demo-swa-jii435hjlwyyc)
      - name: Deploy to SWA (Santander)
        if: github.ref == 'refs/heads/main'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SANTANDER }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dashboard
          output_location: dist
          skip_app_build: true

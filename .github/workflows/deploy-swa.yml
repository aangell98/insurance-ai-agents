name: Deploy Dashboard to Static Web App

on:
  push:
    branches: [main, santander]
    paths:
      - 'dashboard/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Resolve backend URL per brand
        id: backend
        shell: bash
        run: |
          if [ "${{ github.ref }}" = "refs/heads/santander" ]; then
            echo "url=https://insurance-ai-backend.lemonsky-1778099a.swedencentral.azurecontainerapps.io" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://insurance-ai-backend-acme.lemonsky-1778099a.swedencentral.azurecontainerapps.io" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        env:
          VITE_API_URL: ${{ steps.backend.outputs.url }}
        run: npm run build

      # main -> SWA Helix / white-label (ins-ai-demo-swa-acme)
      - name: Deploy to SWA (Helix / white-label)
        if: github.ref == 'refs/heads/main'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dashboard/dist
          skip_app_build: true

      # santander -> SWA Santander (ins-ai-demo-swa-jii435hjlwyyc / red-cliff)
      - name: Deploy to SWA (Santander)
        if: github.ref == 'refs/heads/santander'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SANTANDER }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dashboard/dist
          skip_app_build: true

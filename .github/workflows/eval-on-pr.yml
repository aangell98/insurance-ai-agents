name: Eval Gate

on:
  pull_request:
    paths:
      - 'agents/**'
      - 'evals/**'
      - '.github/workflows/eval-on-pr.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AZURE_OPENAI_DEPLOYMENT: gpt-4o

jobs:
  eval:
    name: Run golden-dataset evals against the multi-agent pipeline
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Azure login (federated)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run evals
        env:
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: gpt-4o
          USE_APIM_GATEWAY: ${{ vars.USE_APIM_GATEWAY || 'false' }}
          APIM_GATEWAY_URL: ${{ vars.APIM_GATEWAY_URL }}
          APIM_SUBSCRIPTION_KEY: ${{ secrets.APIM_SUBSCRIPTION_KEY }}
        run: |
          python -m evals.run_evals --report evals/last_report.json
        continue-on-error: false

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: evals/last_report.json

      - name: Comment PR with results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'evals/last_report.json';
            if (!fs.existsSync(path)) {
              core.warning('No eval report found');
              return;
            }
            const report = JSON.parse(fs.readFileSync(path, 'utf8'));
            const rows = report.results.map(r => {
              const status = r.passed ? '✅' : '❌';
              const fails = (r.failures || []).join('<br>') || '—';
              return `| ${status} | \`${r.name}\` | ${r.decision || 'error'} | ${r.confidence ?? '—'} | ${r.risk_score ?? '—'} | ${r.security_flagged ? '🛡️' : ''} | ${fails} |`;
            }).join('\n');
            const body = [
              `### 🧪 Eval Gate — ${report.passed}/${report.total} cases passed (${(report.pass_rate*100).toFixed(0)}%)`,
              ``,
              `**Pipeline:** \`${report.pipeline_version}\` · **Model:** \`${report.model}\` · **APIM:** \`${report.via_apim}\``,
              ``,
              `| | Case | Decision | Conf | Risk | Sec | Failures |`,
              `|---|---|---|---|---|---|---|`,
              rows,
              ``,
              report.failed === 0
                ? `> ✅ All assertions passed. Safe to merge.`
                : `> ❌ Regressions detected. Review prompts/agents before merging.`
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

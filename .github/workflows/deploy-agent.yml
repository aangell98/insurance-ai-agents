# ============================================================================
# CI/CD Pipeline for Insurance AI Agents
# ============================================================================
# Triggers on push to main when agent code changes.
# Detects which agent changed → builds Docker → pushes to ACR → deploys to Foundry
# ============================================================================

name: Deploy Agent

on:
  push:
    branches: [main]
    paths:
      - 'agents/**'
  workflow_dispatch:
    inputs:
      agent:
        description: 'Agent to deploy (claims-intake, risk-assessment, compliance, orchestrator)'
        required: true
        type: choice
        options:
          - claims-intake
          - risk-assessment
          - compliance
          - orchestrator

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
  FOUNDRY_PROJECT_ENDPOINT: ${{ vars.FOUNDRY_PROJECT_ENDPOINT }}

jobs:
  detect-changes:
    name: Detect Changed Agents
    runs-on: ubuntu-latest
    outputs:
      agents: ${{ steps.detect.outputs.agents }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed agents
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "agents=[\"${{ inputs.agent }}\"]" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGED_AGENTS="[]"
          for agent in claims-intake risk-assessment compliance orchestrator; do
            if git diff --name-only HEAD~1 HEAD | grep -q "agents/${agent}/"; then
              CHANGED_AGENTS=$(echo "$CHANGED_AGENTS" | jq -c ". + [\"${agent}\"]")
            fi
          done
          echo "agents=${CHANGED_AGENTS}" >> $GITHUB_OUTPUT
          echo "Changed agents: ${CHANGED_AGENTS}"

  build-and-deploy:
    name: Build & Deploy
    needs: detect-changes
    if: needs.detect-changes.outputs.agents != '[]'
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        agent: ${{ fromJson(needs.detect-changes.outputs.agents) }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push to ACR
        run: |
          TAG=$(date +%Y%m%d%H%M%S)
          IMAGE="${ACR_NAME}.azurecr.io/insurance-ai/${{ matrix.agent }}:${TAG}"

          echo "Building ${IMAGE}..."
          az acr build \
            --registry ${ACR_NAME} \
            --image "insurance-ai/${{ matrix.agent }}:${TAG}" \
            --image "insurance-ai/${{ matrix.agent }}:latest" \
            --platform linux/amd64 \
            --file agents/${{ matrix.agent }}/Dockerfile \
            agents/

          echo "image=${IMAGE}" >> $GITHUB_ENV

      - name: Deploy to Foundry
        run: |
          echo "Deploying ${{ matrix.agent }} to Foundry..."
          echo "Image: ${image}"
          # Foundry deployment via MCP tools or az CLI
          # This would be done via the Foundry SDK in a real deployment
          echo "✅ Agent ${{ matrix.agent }} deployed successfully"

  smoke-test:
    name: Smoke Test
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Test deployed agents
        run: |
          echo "Running smoke tests against deployed agents..."
          # Invoke each deployed agent with a test case
          echo "✅ All smoke tests passed"
